site_name: GnomieLibrary
site_description: Computer vision, machine learning, and robotics algorithms.
site_author: SaveEarth

repo_name: GnomieLibrary
repo_url: https://github.com/kshashankrao/Gnomielibrary

theme:
  name: material
  logo: material/library
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: Fira Code
  features:
    - search.suggest
    - search.highlight
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Modules:
    - Coordinate Transform: coordinate_transform.md
    - DBSCAN: dbscan.md
    - Inverse Perspective Mapping: ipm.md
    - Localization: localization.md
    - Self Attention: self_attention.md
    - Structure from Motion: sfm.md
    - Surface Normals: surface_normal.md
